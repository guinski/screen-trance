<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Screen Trance</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none;
    display: flex; align-items: center; justify-content: center;
  }
  #stage { position: relative; background: #000; }
  canvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="stage"><canvas id="c"></canvas></div>
<div id="overlay" style="position:fixed;inset:0;z-index:99;background:transparent;cursor:pointer;-webkit-tap-highlight-color:transparent;"></div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const TAU = Math.PI * 2;

const PHONE_ASPECT = 420 / 737;
const stage = document.getElementById('stage');

// One offscreen per color (6 total) — pre-rendered spiral disc at angle=0
// At render time we composite them with the correct blend onto system canvases
const singleDiscs = []; // [C, M, Y, R, G, B] — each is a canvas with transparent bg + colored arms

// System canvases
const offDark  = document.createElement('canvas'); // CMY system (multiply -> black)
const ctxDark  = offDark.getContext('2d');
const offLight = document.createElement('canvas'); // RGB system (screen -> white)  
const ctxLight = offLight.getContext('2d');

// White backing canvas — drawn before CMY so multiply has something to act on
const offWhiteBg = document.createElement('canvas');
const ctxWBg = offWhiteBg.getContext('2d');

// Face masks
const maskLight = document.createElement('canvas'); // white face area
const mLight    = maskLight.getContext('2d');
const maskDark  = document.createElement('canvas'); // dark staircase area
const mDark     = maskDark.getContext('2d');

const F = {
  circleX: 0.7810, circleY: 0.4118, circleR: 0.0976,
  sqX: 0.1286, sqY: 0.3568, sqW: 0.1929, sqH: 0.1099,
  step1X: 0.7774, step1YEnd: 0.2978,
  step2X: 0.5500, step2YEnd: 0.6696,
  step3X: 0.3690,
};

function drawStaircasePath(c, W, H) {
  c.beginPath();
  c.moveTo(W * F.step1X, 0);
  c.lineTo(W, 0);
  c.lineTo(W, H);
  c.lineTo(W * F.step3X, H);
  c.lineTo(W * F.step3X, H * F.step2YEnd);
  c.lineTo(W * F.step2X, H * F.step2YEnd);
  c.lineTo(W * F.step2X, H * F.step1YEnd);
  c.lineTo(W * F.step1X, H * F.step1YEnd);
  c.closePath();
}

function buildMasks(W, H) {
  mLight.clearRect(0, 0, W, H);
  mLight.fillStyle = '#fff';
  mLight.fillRect(0, 0, W, H);
  mLight.globalCompositeOperation = 'destination-out';
  drawStaircasePath(mLight, W, H);
  mLight.fill();
  mLight.fillRect(W * F.sqX, H * F.sqY, W * F.sqW, H * F.sqH);
  mLight.globalCompositeOperation = 'source-over';
  mLight.beginPath();
  mLight.arc(W * F.circleX, H * F.circleY, W * F.circleR, 0, TAU);
  mLight.fillStyle = '#fff';
  mLight.fill();

  mDark.clearRect(0, 0, W, H);
  mDark.fillStyle = '#fff';
  mDark.fillRect(0, 0, W, H);
  mDark.globalCompositeOperation = 'destination-out';
  mDark.drawImage(maskLight, 0, 0);
  mDark.globalCompositeOperation = 'source-over';
}

// Spiral arms config
const N = 24;
const ARM_W = TAU / (N * 3); // 1/72 of circle per arm

// Build a single-color spiral disc, transparent background, colored arms only
// Size = 2*r x 2*r, center at r,r
function buildDisc(color, r) {
  const size = Math.ceil(r * 2);
  const dc = document.createElement('canvas');
  dc.width = size; dc.height = size;
  const c = dc.getContext('2d');
  const cx = size / 2, cy = size / 2;
  const k = Math.log(r + 1) / TAU;
  const steps = 20;

  c.fillStyle = color;
  for (let i = 0; i < N; i++) {
    const sa = i * (TAU / N);
    c.beginPath();
    for (let s = 0; s <= steps; s++) {
      const theta = (s / steps) * TAU;
      const rad = Math.exp(k * theta) - 1;
      const a = sa + theta;
      s === 0 ? c.moveTo(cx + rad * Math.cos(a), cy + rad * Math.sin(a))
              : c.lineTo(cx + rad * Math.cos(a), cy + rad * Math.sin(a));
    }
    for (let s = steps; s >= 0; s--) {
      const theta = (s / steps) * TAU;
      const rad = Math.exp(k * theta) - 1;
      const a = sa + ARM_W + theta;
      c.lineTo(cx + rad * Math.cos(a), cy + rad * Math.sin(a));
    }
    c.closePath();
    c.fill();
  }
  return dc;
}

let discR = 0;
let whiteDiscIdx = -1; // index of the white coverage disc in singleDiscs

const CMY = ['#00ffff', '#ff00ff', '#ffff00'];
const RGB = ['#ff0000', '#00ff00', '#0000ff'];

// Speeds: very close together for slow phase
const CMY_SPEEDS = [ 0.00750,  0.00728,  0.00773];
const RGB_SPEEDS = [-0.00773, -0.00728, -0.00750];
const ALL_SPEEDS = [...CMY_SPEEDS, ...RGB_SPEEDS];
const ALL_VEL_MULT = [0.85, 1.00, 1.15, 1.20, 0.90, 1.00]; // C,M,Y,R,G,B

// All start at 0 = fully aligned = black (CMY) / white (RGB)
const angles = [0, 0, 0, 0, 0, 0];

function rebuildDiscs(W, H, cxDark, cyDark, cxLight, cyLight) {
  const r1 = Math.sqrt(Math.max(cxDark,  W-cxDark) **2 + Math.max(cyDark,  H-cyDark) **2) * 1.05;
  const r2 = Math.sqrt(Math.max(cxLight, W-cxLight)**2 + Math.max(cyLight, H-cyLight)**2) * 1.05;
  discR = Math.max(r1, r2);
  singleDiscs.length = 0;
  [...CMY, ...RGB].forEach(color => singleDiscs.push(buildDisc(color, discR)));
  whiteDiscIdx = singleDiscs.length;
  singleDiscs.push(buildDisc('#ffffff', discR));
}

function resize() {
  const winW = window.innerWidth, winH = window.innerHeight;
  let w = winW, h = winW / PHONE_ASPECT;
  if (h > winH) { h = winH; w = winH * PHONE_ASPECT; }
  stage.style.width = w + 'px';
  stage.style.height = h + 'px';

  [canvas, offDark, offLight, offWhiteBg, maskLight, maskDark].forEach(cv => {
    cv.width = w; cv.height = h;
  });

  buildMasks(w, h);

  const cxL = w * F.circleX, cyL = h * F.circleY;
  const cxD = w * (F.sqX + F.sqW/2), cyD = h * (F.sqY + F.sqH/2);
  rebuildDiscs(w, h, cxD, cyD, cxL, cyL);
  drawFrame();
}

// Draw a pre-rendered disc centered at (cx,cy) rotated by angle onto target context
function blitDisc(targetCtx, discIdx, cx, cy, angle) {
  const dc = singleDiscs[discIdx];
  targetCtx.save();
  targetCtx.translate(cx, cy);
  targetCtx.rotate(angle);
  targetCtx.drawImage(dc, -discR, -discR);
  targetCtx.restore();
}

function drawFrame() {
  const W = canvas.width, H = canvas.height;

  const cxL = W * F.circleX, cyL = H * F.circleY; // light side center (circle eye)
  const cxD = W * (F.sqX + F.sqW/2), cyD = H * (F.sqY + F.sqH/2); // dark side center (square eye)

  // ── Dark system (CMY, multiply onto white patches → black when aligned) ──
  // Step 1: black background (this IS the correct rest/gap color now)
  ctxDark.fillStyle = '#000';
  ctxDark.fillRect(0, 0, W, H);
  // Step 2: patch white only where any CMY arm will land (union coverage),
  // so multiply has something to act on there, while true gaps stay black.
  ctxDark.globalCompositeOperation = 'source-over';
  blitDisc(ctxDark, whiteDiscIdx, cxD, cyD, angles[0]);
  blitDisc(ctxDark, whiteDiscIdx, cxD, cyD, angles[1]);
  blitDisc(ctxDark, whiteDiscIdx, cxD, cyD, angles[2]);
  // Step 3: CMY discs with multiply onto those white patches
  ctxDark.globalCompositeOperation = 'multiply';
  blitDisc(ctxDark, 0, cxD, cyD, angles[0]); // C
  blitDisc(ctxDark, 1, cxD, cyD, angles[1]); // M
  blitDisc(ctxDark, 2, cxD, cyD, angles[2]); // Y
  ctxDark.globalCompositeOperation = 'source-over';
  // Step 4: clip to dark face region
  ctxDark.globalCompositeOperation = 'destination-in';
  ctxDark.drawImage(maskDark, 0, 0);
  ctxDark.globalCompositeOperation = 'source-over';

  // ── Light system (RGB, screen onto white → white in gaps, white when aligned) ──
  // Step 1: white background — gaps stay white
  ctxLight.fillStyle = '#fff';
  ctxLight.fillRect(0, 0, W, H);
  // Step 2: stamp black disc over union of arm coverage, so screen has #000 to work on
  //         (screen(#000, color) = color; screen(#fff, color) = #fff — we want gaps white,
  //          arms colored, so we need black under each arm area only)
  ctxLight.globalCompositeOperation = 'destination-out'; // punch holes = black in canvas
  blitDisc(ctxLight, whiteDiscIdx, cxL, cyL, angles[3]);
  blitDisc(ctxLight, whiteDiscIdx, cxL, cyL, angles[4]);
  blitDisc(ctxLight, whiteDiscIdx, cxL, cyL, angles[5]);
  ctxLight.globalCompositeOperation = 'source-over';
  // Step 3: RGB discs with screen onto those black patches
  ctxLight.globalCompositeOperation = 'screen';
  blitDisc(ctxLight, 3, cxL, cyL, angles[3]); // R
  blitDisc(ctxLight, 4, cxL, cyL, angles[4]); // G
  blitDisc(ctxLight, 5, cxL, cyL, angles[5]); // B
  ctxLight.globalCompositeOperation = 'source-over';
  // Step 3: clip to light face region
  ctxLight.globalCompositeOperation = 'destination-in';
  ctxLight.drawImage(maskLight, 0, 0);
  ctxLight.globalCompositeOperation = 'source-over';

  // ── Compose onto main canvas ──
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  ctx.drawImage(offDark, 0, 0);
  ctx.drawImage(offLight, 0, 0);
}

// ── Audio ────────────────────────────────────────────────────────────────────
let audioCtx = null;
const audioOscs = []; // { osc, panner, gainNode, baseFreq }
const BASE_FREQS = [500, 600];

// Leslie Doppler params — rotor IS the spiral angle
const PITCH_DEPTH  = 40;   // Hz deviation around base
const PAN_DEPTH    = 0.9;  // 0–1 stereo width

let audioMaster = null;
let audioBuilt  = false;
let panAngle    = 0;   // pan follows spiral
let lfoAngle    = 0;   // pitch LFO angle, rate driven by swipe

function buildAudioGraph() {
  if (audioBuilt) return;
  audioBuilt = true;

  const master = audioCtx.createGain();
  master.gain.setValueAtTime(0, audioCtx.currentTime);
  master.gain.linearRampToValueAtTime(0.6, audioCtx.currentTime + 1);
  master.connect(audioCtx.destination);
  audioMaster = master;

  BASE_FREQS.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = freq;

    const panner = audioCtx.createStereoPanner();
    panner.pan.value = 0;

    const gainNode = audioCtx.createGain();
    gainNode.gain.value = 0.33;

    osc.connect(gainNode);
    gainNode.connect(panner);
    panner.connect(master);
    osc.start();

    audioOscs.push({ osc, panner, gainNode, baseFreq: freq });
  });
}

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
  buildAudioGraph();
}

function updateAudio() {
  if (!audioBuilt || !audioCtx) return;

  const speed  = Math.abs(velocity);
  const panDir = velocity < 0 ? -1 : 1;

  // Pan: follows spiral angle, same direction
  panAngle += panDir * (ALL_SPEEDS[0] + speed * ALL_VEL_MULT[0]);
  const panVal = Math.cos(panAngle) * PAN_DEPTH;

  // Pitch LFO: own angle, rate 0.3 Hz rest → 20 Hz full swipe
  const lfoHz = 0.3 + Math.min(speed * 120, 19.7);
  lfoAngle += lfoHz * (1 / 24) * Math.PI * 2;
  const pitchMod = Math.sin(lfoAngle) * PITCH_DEPTH;

  audioOscs.forEach(({ osc, panner, baseFreq }) => {
    panner.pan.setTargetAtTime(panVal, audioCtx.currentTime, 0.008);
    osc.frequency.setTargetAtTime(baseFreq + pitchMod, audioCtx.currentTime, 0.008);
  });
}

// ── Input ────────────────────────────────────────────────────────────────────
let velocity = 0;
const friction = 0.96;
let lastX = null, lastY = null, lastT = null;
let started = false;

function startExperience() { /* handled directly in pointerdown */ }

// Re-measure after fullscreen transition completes
document.addEventListener('fullscreenchange', resize);
document.addEventListener('webkitfullscreenchange', resize);

function isInsideCircle(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = (clientX - rect.left) * scaleX;
  const y = (clientY - rect.top) * scaleY;
  const cx = canvas.width * F.circleX, cy = canvas.height * F.circleY, r = canvas.width * F.circleR;
  return Math.hypot(x - cx, y - cy) <= r;
}

function isInsideSquare(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = (clientX - rect.left) * scaleX;
  const y = (clientY - rect.top) * scaleY;
  const sx = canvas.width * F.sqX, sy = canvas.height * F.sqY;
  const sw = canvas.width * F.sqW, sh = canvas.height * F.sqH;
  return x >= sx && x <= sx + sw && y >= sy && y <= sy + sh;
}

let pausedDark  = false; // CMY / quadrado
let pausedLight = false; // RGB / círculo

function togglePauseDark() {
  pausedDark = !pausedDark;
  // quadrado controla oscilador médio (700 Hz)
  if (audioBuilt && audioCtx) {
    const g = audioOscs[0].gainNode;
    const target = pausedDark ? 0 : 0.33;
    g.gain.cancelScheduledValues(audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(target, audioCtx.currentTime + 0.2);
  }
}

function togglePauseLight() {
  pausedLight = !pausedLight;
  // círculo controla oscilador agudo (1750 Hz)
  if (audioBuilt && audioCtx) {
    const g = audioOscs[1].gainNode;
    const target = pausedLight ? 0 : 0.33;
    g.gain.cancelScheduledValues(audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(target, audioCtx.currentTime + 0.2);
  }
}

let tapCount = 0, lastTapTime = 0;
const TAP_WINDOW = 600;

function captureHighRes() {
  const targetW = 1080;
  const targetH = Math.round(targetW / PHONE_ASPECT);
  const prevW = canvas.width, prevH = canvas.height;

  [canvas, offDark, offLight, offWhiteBg, maskLight, maskDark].forEach(cv => { cv.width = targetW; cv.height = targetH; });
  buildMasks(targetW, targetH);
  const cxL = targetW * F.circleX, cyL = targetH * F.circleY;
  const cxD = targetW * (F.sqX + F.sqW / 2), cyD = targetH * (F.sqY + F.sqH / 2);
  rebuildDiscs(targetW, targetH, cxD, cyD, cxL, cyL);
  drawFrame();

  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'screen-trance-' + Date.now() + '.png';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 2000);
  }, 'image/png');

  [canvas, offDark, offLight, offWhiteBg, maskLight, maskDark].forEach(cv => { cv.width = prevW; cv.height = prevH; });
  buildMasks(prevW, prevH);
  const cxL2 = prevW * F.circleX, cyL2 = prevH * F.circleY;
  const cxD2 = prevW * (F.sqX + F.sqW / 2), cyD2 = prevH * (F.sqY + F.sqH / 2);
  rebuildDiscs(prevW, prevH, cxD2, cyD2, cxL2, cyL2);
  drawFrame();
}

let downX = null, downY = null, downTime = null;

// Overlay captures the very first touch — guaranteed user gesture for fullscreen + audio
document.getElementById('overlay').addEventListener('pointerdown', e => {
  started = true;
  document.getElementById('overlay').style.display = 'none';

  const el = document.documentElement;
  const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
  if (req) req.call(el).catch(() => {});

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  buildAudioGraph();

  requestAnimationFrame(render);

  // don't pass initial touch as swipe — reset tracking state
  downX = null; downY = null; downTime = null;
  lastX = null; lastY = null; lastT = null;
  velocity = 0;
}, { once: true });

canvas.addEventListener('pointerdown', e => {
  if (!started) return;
  downX = e.clientX; downY = e.clientY; downTime = performance.now();
  lastX = e.clientX; lastY = e.clientY; lastT = performance.now();
});
canvas.addEventListener('pointermove', e => {
  if (lastX === null) return;
  const now = performance.now();
  const dt = Math.max(now - lastT, 1);
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  if (Math.abs(dy) > Math.abs(dx)) {
    velocity += (-dy / canvas.height) * 0.5 * (16 / dt);
  } else {
    velocity += (dx / canvas.width) * 0.5 * (16 / dt);
  }
  lastX = e.clientX; lastY = e.clientY; lastT = now;
});
canvas.addEventListener('pointerup', e => {
  const dt = performance.now() - (downTime || 0);
  const dist = Math.hypot(e.clientX - (downX || e.clientX), e.clientY - (downY || e.clientY));
  if (dt < 300 && dist < 10) {
    if (isInsideSquare(e.clientX, e.clientY)) {
      togglePauseDark();
    } else if (isInsideCircle(e.clientX, e.clientY)) {
      const now = performance.now();
      tapCount = (now - lastTapTime < TAP_WINDOW) ? tapCount + 1 : 1;
      lastTapTime = now;
      if (tapCount >= 3) {
        tapCount = 0;
        captureHighRes();
      } else {
        togglePauseLight();
      }
    }
  }
  lastX = null; lastY = null;
});
canvas.addEventListener('touchstart', e => {
  // prevent scroll/zoom but still allow pointerdown to fire
  if (e.touches.length === 1) e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// ── Render loop ───────────────────────────────────────────────────────────────
const FRAME_INTERVAL = 1000 / 24;
let lastFrameTime = 0;

function render(now) {
  requestAnimationFrame(render);
  if (now - lastFrameTime < FRAME_INTERVAL) return;
  lastFrameTime = now;

  // Each system can be paused independently
  const bothPaused = pausedDark && pausedLight;
  if (!bothPaused) {
    velocity *= friction;
  }
  if (!pausedDark)  { angles[0] += ALL_SPEEDS[0] + velocity * ALL_VEL_MULT[0];
                      angles[1] += ALL_SPEEDS[1] + velocity * ALL_VEL_MULT[1];
                      angles[2] += ALL_SPEEDS[2] + velocity * ALL_VEL_MULT[2]; }
  if (!pausedLight) { angles[3] += ALL_SPEEDS[3] + velocity * ALL_VEL_MULT[3];
                      angles[4] += ALL_SPEEDS[4] + velocity * ALL_VEL_MULT[4];
                      angles[5] += ALL_SPEEDS[5] + velocity * ALL_VEL_MULT[5]; }
  if (bothPaused) return;

  updateAudio();

  drawFrame();
}

resize();
window.addEventListener('resize', resize);
</script>
</body>
</html>
